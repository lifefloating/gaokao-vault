services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gaokao
      POSTGRES_PASSWORD: gaokao
      POSTGRES_DB: gaokao_vault
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gaokao -d gaokao_vault"]
      interval: 5s
      timeout: 3s
      retries: 5

  crawler:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      GAOKAO_DB__DSN: postgresql://gaokao:gaokao@db:5432/gaokao_vault
      GAOKAO_DB__POOL_MIN: 5
      GAOKAO_DB__POOL_MAX: 20
      GAOKAO_CRAWL__CONCURRENCY: 5
      GAOKAO_CRAWL__BASE_DELAY: 1.0
    volumes:
      - crawl_data:/app/crawl_data
    # Override CMD per run — see README for examples
    entrypoint: ["gaokao-vault"]
    command: ["--help"]

volumes:
  pgdata:
  crawl_data:
