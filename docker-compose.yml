services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gaokao
      POSTGRES_PASSWORD: gaokao
      POSTGRES_DB: gaokao_vault
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gaokao -d gaokao_vault"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  crawler:
    build: .
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file: .env
    environment:
      # Override DB DSN to point to the compose-internal db service
      GAOKAO_DB__DSN: postgresql://gaokao:gaokao@db:5432/gaokao_vault
    volumes:
      - crawl_data:/app/crawl_data
    # Override CMD per run — see README for examples
    entrypoint: ["gaokao-vault"]
    command: ["--help"]
    healthcheck:
      test: ["CMD", "gaokao-vault", "healthcheck"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
  crawl_data:
  minio_data:
